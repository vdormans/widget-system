<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Widgets para Notion</title>
    <link rel="stylesheet" href="./shared/theme.css">
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: var(--text);
            transition: border-color 0.15s ease;
        }
        .card:hover { border-color: var(--accent); }
        .card h2 { font-size: 16px; margin: 0 0 6px; }
        .card p { font-size: 13px; color: var(--text-dim); margin: 0; }
    </style>
</head>
<body>
    <div class="page">
        <h1>Widgets para Notion</h1>
        <div class="grid">
            <a class="card" href="./widgets/clock/configure.html">
                <h2>Reloj Flip</h2>
                <p>Reloj estilo flip-clock con hora, AM/PM y día de la semana.</p>
            </a>
            <a class="card" href="./widgets/countdown/configure.html">
                <h2>Cuenta Regresiva</h2>
                <p>Título personalizado, unidades a elección y mensaje al finalizar.</p>
            </a>
            <!-- Cada widget nuevo agrega una tarjeta más aquí -->
        </div>
    </div>
</body>
</html>
