<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>Reloj Flip</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            background: transparent !important;
            background-color: transparent !important;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        :root {
            --bg: #262626;
            --text: #d9d9d9;
        }
        .clock {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .flip-clock {
            position: relative;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 100px;
            color: var(--text);
            background-color: var(--bg);
            width: 150px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            overflow: hidden;
        }
        .flip-clock::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: var(--text);
            top: 50%;
            transform: translateY(-50%);
        }
        .ampm {
            position: absolute;
            left: 10px;
            bottom: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--text);
        }
        .day {
            position: absolute;
            right: 10px;
            bottom: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
            font-size: 15px;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="flip-clock" id="hours-container">
            <span id="hours">12</span>
            <div class="ampm" id="ampm">AM</div>
        </div>
        <div class="flip-clock" id="minutes-container">
            <span id="minutes">00</span>
            <div class="day" id="day">Lunes</div>
        </div>
    </div>
    <script type="module" src="./widget.js"></script>
</body>
</html>
