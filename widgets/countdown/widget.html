<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>Cuenta Regresiva</title>
    <style>
        html, body {
            margin: 0;
            background: transparent !important;
            background-color: transparent !important;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        :root {
            --text: #ffffff;
            --border: #4d4d4d;
        }
        .countdown-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            color: var(--text);
        }
        .message {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 1.2rem;
        }
        .timer {
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
        }
        .time-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .time-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .time-label {
            font-size: 0.8rem;
        }
        .separator {
            height: 40px;
            width: 1px;
            background-color: var(--border);
            margin: 0 5px;
        }
        #end-message {
            display: none;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <div class="countdown-container">
        <div class="message">
            <span id="custom-message">Cuenta regresiva</span>
        </div>
        <div class="timer" id="timer"></div>
        <div id="end-message"></div>
    </div>
    <script type="module" src="./widget.js"></script>
</body>
</html>
